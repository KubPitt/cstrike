<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CS-ZM</title>
	<style>
		@font-face
		{
			font-family: boydFont;
			src: url(assets/coming-soon-latin-400-normal.woff);
			font-weight: bolder;
		}
		body
		{
			color: #dbd7d7;
			background-color: #13220c;
			background: radial-gradient(circle, #1b2b13, #051200fc);
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			font-family: boydFont;
		}
		footer
		{
			margin-bottom: 10px;
			text-align: center;
		}
		h1
		{
			margin:0;
			text-shadow: 0 0 5px lime, 0 0 5px lime, 0 0 5px green, 0 0 5px green, 0 0 5px darkgreen, 0 0 5px darkgreen, 0 0 5px darkgreen;
		}
		p
		{
			margin: 0;
		}
		.clan
		{
			color: #b22222;
		}
		.owner
		{
			color: #b22222;
			text-decoration: none;
		}
		.owner:hover
		{
			transform: scale(1.2) rotate(10deg);  
			text-decoration: underline;
			color: #ffd700;
			transform: scale(1.2) rotate(10deg);
		}
		.info-box
		{
    		background-image: url(assets/cszm.png);
   			background-repeat: round;
			background-color: rgb(0 0 0 / 30%);
			border: 1px solid #212121;
			border-radius: 10px;
			padding: 20px;
			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
			text-align: center;
			display: block;
			margin: auto;
			text-shadow: 0 0 5px lime, 0 0 5px lime, 0 0 5px green, 0 0 5px green, 0 0 5px darkgreen, 0 0 5px darkgreen, 0 0 5px darkgreen;
		}
	</style>
</head>
<body>
	<h1>WELCOME 2 <span class='clan'>CS-ZM</span></h1>
	<p>Owned and operated by <a class='owner' href="https://steamcommunity.com/id/kubpitt/">@KubPitt</a></p>
	<div class='info-box'><h2>UNDER CONSTRUCTION</h2></div>
	<footer><a href="https://discord.gg/4gjyXR5A4Q" style="color: #7289DA;">https://discord.gg/4gjyXR5A4Q</a><br>Join the discord, homeslice.</footer></div>
</body>
</html>
